<div class="row justify-content-center">
    <div class="col-8">
        <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
            <h2 id="jhi-precios-heading" jhiTranslate="lacampesinaApp.precios.home.createOrEditLabel">Create or edit a Precios</h2>

            <div>
                <jhi-alert-error></jhi-alert-error>

                <div class="form-group" [hidden]="!editForm.get('id')!.value">
                    <label for="id" jhiTranslate="global.field.id">ID</label>
                    <input type="text" class="form-control" id="id" name="id" formControlName="id" readonly />
                </div>

                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="lacampesinaApp.precios.fechaFin" for="field_fechaFin">Fecha Fin</label>
                    <div class="input-group">
                        <input id="field_fechaFin" type="text" class="form-control" name="fechaFin" ngbDatepicker #fechaFinDp="ngbDatepicker" formControlName="fechaFin"/>
                        <span class="input-group-append">
                            <button type="button" class="btn btn-secondary" (click)="fechaFinDp.toggle()"><fa-icon icon="calendar-alt"></fa-icon></button>
                        </span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="lacampesinaApp.precios.fechaInicio" for="field_fechaInicio">Fecha Inicio</label>
                    <div class="input-group">
                        <input id="field_fechaInicio" type="text" class="form-control" name="fechaInicio" ngbDatepicker #fechaInicioDp="ngbDatepicker" formControlName="fechaInicio"/>
                        <span class="input-group-append">
                            <button type="button" class="btn btn-secondary" (click)="fechaInicioDp.toggle()"><fa-icon icon="calendar-alt"></fa-icon></button>
                        </span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="lacampesinaApp.precios.precio" for="field_precio">Precio</label>
                    <input type="number" class="form-control" name="precio" id="field_precio"
                           formControlName="precio"/>
                </div>

                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="lacampesinaApp.precios.loteId" for="field_loteId">Lote Id</label>
                    <select class="form-control" id="field_loteId" name="loteId" formControlName="loteId">
                        <option [ngValue]="null"></option>
                        <option [ngValue]="lotesOption.id === editForm.get('loteId')!.value?.id ? editForm.get('loteId')!.value : lotesOption" *ngFor="let lotesOption of lotes; trackBy: trackById">{{ lotesOption.id }}</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="lacampesinaApp.precios.clienteId" for="field_clienteId">Cliente Id</label>
                    <select class="form-control" id="field_clienteId" name="clienteId" formControlName="clienteId">
                        <option [ngValue]="null"></option>
                        <option [ngValue]="clientesOption.id === editForm.get('clienteId')!.value?.id ? editForm.get('clienteId')!.value : clientesOption" *ngFor="let clientesOption of clientes; trackBy: trackById">{{ clientesOption.id }}</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="lacampesinaApp.precios.precioId" for="field_precioId">Precio Id</label>
                    <select class="form-control" id="field_precioId" name="precioId" formControlName="precioId">
                        <option [ngValue]="null"></option>
                        <option [ngValue]="facturasDetalleOption.id === editForm.get('precioId')!.value?.id ? editForm.get('precioId')!.value : facturasDetalleOption" *ngFor="let facturasDetalleOption of facturasdetalles; trackBy: trackById">{{ facturasDetalleOption.id }}</option>
                    </select>
                </div>
            </div>

            <div>
                <button type="button" id="cancel-save" class="btn btn-secondary" (click)="previousState()">
                    <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
                </button>

                <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary">
                    <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Save</span>
                </button>
            </div>
        </form>
    </div>
</div>
