<div>
    <h2 id="page-heading">
        <span jhiTranslate="lacampesinaApp.precios.home.title">Precios</span>

        <button id="jh-create-entity" class="btn btn-primary float-right jh-create-entity create-precios" [routerLink]="['/precios/new']">
            <fa-icon icon="plus"></fa-icon>
            <span  jhiTranslate="lacampesinaApp.precios.home.createLabel">
            Create a new Precios
            </span>
        </button>
    </h2>

    <jhi-alert-error></jhi-alert-error>

    <jhi-alert></jhi-alert>

    <div class="alert alert-warning" id="no-result" *ngIf="precios?.length === 0">
        <span jhiTranslate="lacampesinaApp.precios.home.notFound">No precios found</span>
    </div>

    <div class="table-responsive" id="entities" *ngIf="precios && precios.length > 0">
        <table class="table table-striped" aria-describedby="page-heading">
            <thead>
                <tr>
                    <th scope="col" ><span jhiTranslate="global.field.id">ID</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.precios.fechaFin">Fecha Fin</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.precios.fechaInicio">Fecha Inicio</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.precios.precio">Precio</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.precios.loteId">Lote Id</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.precios.clienteId">Cliente Id</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.precios.precioId">Precio Id</span></th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let precios of precios ;trackBy: trackId">
                    <td><a [routerLink]="['/precios', precios.id, 'view']">{{ precios.id }}</a></td>
                    <td>{{ precios.fechaFin | date:'mediumDate' }}</td>
                    <td>{{ precios.fechaInicio | date:'mediumDate' }}</td>
                    <td>{{ precios.precio }}</td>
                    <td>
                        <div *ngIf="precios.loteId">
                            <a [routerLink]="['/lotes', precios.loteId?.id, 'view']" >{{ precios.loteId?.id }}</a>
                        </div>
                    </td>
                    <td>
                        <div *ngIf="precios.clienteId">
                            <a [routerLink]="['/clientes', precios.clienteId?.id, 'view']" >{{ precios.clienteId?.id }}</a>
                        </div>
                    </td>
                    <td>
                        <div *ngIf="precios.precioId">
                            <a [routerLink]="['/facturas-detalle', precios.precioId?.id, 'view']" >{{ precios.precioId?.id }}</a>
                        </div>
                    </td>
                    <td class="text-right">
                        <div class="btn-group">
                            <button type="submit"
                                    [routerLink]="['/precios', precios.id, 'view']"
                                    class="btn btn-info btn-sm">
                                <fa-icon icon="eye"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
                            </button>

                            <button type="submit"
                                    [routerLink]="['/precios', precios.id, 'edit']"
                                    class="btn btn-primary btn-sm">
                                <fa-icon icon="pencil-alt"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
                            </button>

                            <button type="submit" (click)="delete(precios)"
                                    class="btn btn-danger btn-sm">
                                <fa-icon icon="times"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
