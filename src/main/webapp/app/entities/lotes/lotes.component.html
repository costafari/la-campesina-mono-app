<div>
    <h2 id="page-heading">
        <span jhiTranslate="lacampesinaApp.lotes.home.title">Lotes</span>

        <button id="jh-create-entity" class="btn btn-primary float-right jh-create-entity create-lotes" [routerLink]="['/lotes/new']">
            <fa-icon icon="plus"></fa-icon>
            <span  jhiTranslate="lacampesinaApp.lotes.home.createLabel">
            Create a new Lotes
            </span>
        </button>
    </h2>

    <jhi-alert-error></jhi-alert-error>

    <jhi-alert></jhi-alert>

    <div class="alert alert-warning" id="no-result" *ngIf="lotes?.length === 0">
        <span jhiTranslate="lacampesinaApp.lotes.home.notFound">No lotes found</span>
    </div>

    <div class="table-responsive" id="entities" *ngIf="lotes && lotes.length > 0">
        <table class="table table-striped" aria-describedby="page-heading">
            <thead>
                <tr>
                    <th scope="col" ><span jhiTranslate="global.field.id">ID</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.lotes.cantidad">Cantidad</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.lotes.createdAt">Created At</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.lotes.fechaEntrada">Fecha Entrada</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.lotes.lote">Lote</span></th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let lotes of lotes ;trackBy: trackId">
                    <td><a [routerLink]="['/lotes', lotes.id, 'view']">{{ lotes.id }}</a></td>
                    <td>{{ lotes.cantidad }}</td>
                    <td>{{ lotes.createdAt | date:'medium' }}</td>
                    <td>{{ lotes.fechaEntrada | date:'medium' }}</td>
                    <td>{{ lotes.lote }}</td>
                    <td class="text-right">
                        <div class="btn-group">
                            <button type="submit"
                                    [routerLink]="['/lotes', lotes.id, 'view']"
                                    class="btn btn-info btn-sm">
                                <fa-icon icon="eye"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
                            </button>

                            <button type="submit"
                                    [routerLink]="['/lotes', lotes.id, 'edit']"
                                    class="btn btn-primary btn-sm">
                                <fa-icon icon="pencil-alt"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
                            </button>

                            <button type="submit" (click)="delete(lotes)"
                                    class="btn btn-danger btn-sm">
                                <fa-icon icon="times"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
