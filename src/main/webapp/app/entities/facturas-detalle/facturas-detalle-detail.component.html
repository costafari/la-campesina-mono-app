<div class="row justify-content-center">
    <div class="col-8">
        <div *ngIf="facturasDetalle">
            <h2><span jhiTranslate="lacampesinaApp.facturasDetalle.detail.title">Facturas Detalle</span> {{ facturasDetalle.id }}</h2>

            <hr>

            <jhi-alert-error></jhi-alert-error>

            <dl class="row-md jh-entity-details">
                <dt><span jhiTranslate="lacampesinaApp.facturasDetalle.cantidad">Cantidad</span></dt>
                <dd>
                    <span>{{ facturasDetalle.cantidad }}</span>
                </dd>
                <dt><span jhiTranslate="lacampesinaApp.facturasDetalle.total">Total</span></dt>
                <dd>
                    <span>{{ facturasDetalle.total }}</span>
                </dd>
            </dl>

            <button type="submit"
                    (click)="previousState()"
                    class="btn btn-info">
                <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
            </button>

            <button type="button"
                    [routerLink]="['/facturas-detalle', facturasDetalle.id, 'edit']"
                    class="btn btn-primary">
                <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
            </button>
        </div>
    </div>
</div>
