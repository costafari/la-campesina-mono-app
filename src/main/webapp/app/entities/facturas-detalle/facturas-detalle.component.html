<div>
    <h2 id="page-heading">
        <span jhiTranslate="lacampesinaApp.facturasDetalle.home.title">Facturas Detalles</span>

        <button id="jh-create-entity" class="btn btn-primary float-right jh-create-entity create-facturas-detalle" [routerLink]="['/facturas-detalle/new']">
            <fa-icon icon="plus"></fa-icon>
            <span  jhiTranslate="lacampesinaApp.facturasDetalle.home.createLabel">
            Create a new Facturas Detalle
            </span>
        </button>
    </h2>

    <jhi-alert-error></jhi-alert-error>

    <jhi-alert></jhi-alert>

    <div class="alert alert-warning" id="no-result" *ngIf="facturasDetalles?.length === 0">
        <span jhiTranslate="lacampesinaApp.facturasDetalle.home.notFound">No facturasDetalles found</span>
    </div>

    <div class="table-responsive" id="entities" *ngIf="facturasDetalles && facturasDetalles.length > 0">
        <table class="table table-striped" aria-describedby="page-heading">
            <thead>
                <tr>
                    <th scope="col" ><span jhiTranslate="global.field.id">ID</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.facturasDetalle.cantidad">Cantidad</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.facturasDetalle.total">Total</span></th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let facturasDetalle of facturasDetalles ;trackBy: trackId">
                    <td><a [routerLink]="['/facturas-detalle', facturasDetalle.id, 'view']">{{ facturasDetalle.id }}</a></td>
                    <td>{{ facturasDetalle.cantidad }}</td>
                    <td>{{ facturasDetalle.total }}</td>
                    <td class="text-right">
                        <div class="btn-group">
                            <button type="submit"
                                    [routerLink]="['/facturas-detalle', facturasDetalle.id, 'view']"
                                    class="btn btn-info btn-sm">
                                <fa-icon icon="eye"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
                            </button>

                            <button type="submit"
                                    [routerLink]="['/facturas-detalle', facturasDetalle.id, 'edit']"
                                    class="btn btn-primary btn-sm">
                                <fa-icon icon="pencil-alt"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
                            </button>

                            <button type="submit" (click)="delete(facturasDetalle)"
                                    class="btn btn-danger btn-sm">
                                <fa-icon icon="times"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
