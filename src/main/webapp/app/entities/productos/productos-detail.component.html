<div class="row justify-content-center">
    <div class="col-8">
        <div *ngIf="productos">
            <h2><span jhiTranslate="lacampesinaApp.productos.nombre">Nombre</span> {{ productos.nombre }}</h2>

            <hr>

            <jhi-alert-error></jhi-alert-error>

            <dl class="row-md jh-entity-details">
                <dt><span jhiTranslate="lacampesinaApp.productos.detail.title">Productos</span></dt>
                <dd>
                    <span>{{ productos.id }}</span>
                </dd>
                <dt><span jhiTranslate="lacampesinaApp.productos.descipcion">Descipcion</span></dt>
                <dd>
                    <span>{{ productos.descipcion }}</span>
                </dd>
                <dt><span jhiTranslate="lacampesinaApp.productos.notas">Notas</span></dt>
                <dd>
                    <span>{{ productos.notas }}</span>
                </dd>
            </dl>

            <button type="submit"
                    (click)="previousState()"
                    class="btn btn-info">
                <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
            </button>

            <button type="button"
                    [routerLink]="['/productos', productos.id, 'edit']"
                    class="btn btn-primary">
                <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
            </button>
        </div>
    </div>
</div>
