<div>
    <h2 id="page-heading">
        <span jhiTranslate="lacampesinaApp.productos.home.title">Productos</span>

        <button id="jh-create-entity" class="btn btn-primary float-right jh-create-entity create-productos" [routerLink]="['/productos/new']">
            <fa-icon icon="plus"></fa-icon>
            <span  jhiTranslate="lacampesinaApp.productos.home.createLabel">
            Create a new Productos
            </span>
        </button>
    </h2>

    <jhi-alert-error></jhi-alert-error>

    <jhi-alert></jhi-alert>

    <div class="alert alert-warning" id="no-result" *ngIf="productos?.length === 0">
        <span jhiTranslate="lacampesinaApp.productos.home.notFound">No productos found</span>
    </div>

    <div class="table-responsive" id="entities" *ngIf="productos && productos.length > 0">
        <table class="table table-striped" aria-describedby="page-heading">
            <thead>
                <tr>
                    <th scope="col" ><span jhiTranslate="global.field.id">ID</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.productos.nombre">Nombre</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.productos.descipcion">Descipcion</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.productos.notas">Notas</span></th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let productos of productos ;trackBy: trackId">
                    <td><a [routerLink]="['/productos', productos.id, 'view']">{{ productos.id }}</a></td>
                    <td>{{ productos.nombre }}</td>
                    <td>{{ productos.descipcion }}</td>
                    <td>{{ productos.notas }}</td>
                    <td class="text-right">
                        <div class="btn-group">
                            <button type="submit"
                                    [routerLink]="['/productos', productos.id, 'view']"
                                    class="btn btn-info btn-sm">
                                <fa-icon icon="eye"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
                            </button>

                            <button type="submit"
                                    [routerLink]="['/productos', productos.id, 'edit']"
                                    class="btn btn-primary btn-sm">
                                <fa-icon icon="pencil-alt"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
                            </button>

                            <button type="submit" (click)="delete(productos)"
                                    class="btn btn-danger btn-sm">
                                <fa-icon icon="times"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
