<div>
    <h2 id="page-heading">
        <span jhiTranslate="lacampesinaApp.generalidades.home.title">Generalidades</span>

        <button id="jh-create-entity" class="btn btn-primary float-right jh-create-entity create-generalidades" [routerLink]="['/generalidades/new']">
            <fa-icon icon="plus"></fa-icon>
            <span  jhiTranslate="lacampesinaApp.generalidades.home.createLabel">
            Create a new Generalidades
            </span>
        </button>
    </h2>

    <jhi-alert-error></jhi-alert-error>

    <jhi-alert></jhi-alert>

    <div class="alert alert-warning" id="no-result" *ngIf="generalidades?.length === 0">
        <span jhiTranslate="lacampesinaApp.generalidades.home.notFound">No generalidades found</span>
    </div>

    <div class="table-responsive" id="entities" *ngIf="generalidades && generalidades.length > 0">
        <table class="table table-striped" aria-describedby="page-heading">
            <thead>
                <tr>
                    <th scope="col" ><span jhiTranslate="global.field.id">ID</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.generalidades.createdAt">Created At</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.generalidades.fechaInicio">Fecha Inicio</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.generalidades.nombreEmpresa">Nombre Empresa</span></th>
                    <th scope="col" ><span jhiTranslate="lacampesinaApp.generalidades.nombrePropietario">Nombre Propietario</span></th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let generalidades of generalidades ;trackBy: trackId">
                    <td><a [routerLink]="['/generalidades', generalidades.id, 'view']">{{ generalidades.id }}</a></td>
                    <td>{{ generalidades.createdAt | date:'medium' }}</td>
                    <td>{{ generalidades.fechaInicio | date:'medium' }}</td>
                    <td>{{ generalidades.nombreEmpresa }}</td>
                    <td>{{ generalidades.nombrePropietario }}</td>
                    <td class="text-right">
                        <div class="btn-group">
                            <button type="submit"
                                    [routerLink]="['/generalidades', generalidades.id, 'view']"
                                    class="btn btn-info btn-sm">
                                <fa-icon icon="eye"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
                            </button>

                            <button type="submit"
                                    [routerLink]="['/generalidades', generalidades.id, 'edit']"
                                    class="btn btn-primary btn-sm">
                                <fa-icon icon="pencil-alt"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
                            </button>

                            <button type="submit" (click)="delete(generalidades)"
                                    class="btn btn-danger btn-sm">
                                <fa-icon icon="times"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
