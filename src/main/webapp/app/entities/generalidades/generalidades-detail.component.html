<div class="row justify-content-center">
    <div class="col-8">
        <div *ngIf="generalidades">
            <h2><span jhiTranslate="lacampesinaApp.generalidades.detail.title">Generalidades</span> {{ generalidades.id }}</h2>

            <hr>

            <jhi-alert-error></jhi-alert-error>

            <dl class="row-md jh-entity-details">
                <dt><span jhiTranslate="lacampesinaApp.generalidades.createdAt">Created At</span></dt>
                <dd>
                    <span>{{ generalidades.createdAt }}</span>
                </dd>
                <dt><span jhiTranslate="lacampesinaApp.generalidades.fechaInicio">Fecha Inicio</span></dt>
                <dd>
                    <span>{{ generalidades.fechaInicio }}</span>
                </dd>
                <dt><span jhiTranslate="lacampesinaApp.generalidades.nombreEmpresa">Nombre Empresa</span></dt>
                <dd>
                    <span>{{ generalidades.nombreEmpresa }}</span>
                </dd>
                <dt><span jhiTranslate="lacampesinaApp.generalidades.nombrePropietario">Nombre Propietario</span></dt>
                <dd>
                    <span>{{ generalidades.nombrePropietario }}</span>
                </dd>
            </dl>

            <button type="submit"
                    (click)="previousState()"
                    class="btn btn-info">
                <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
            </button>

            <button type="button"
                    [routerLink]="['/generalidades', generalidades.id, 'edit']"
                    class="btn btn-primary">
                <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
            </button>
        </div>
    </div>
</div>
